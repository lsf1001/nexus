version: '3.8'

services:
  nexus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexus
    ports:
      - "${NEXUS_PORT:-30000}:8000"
    environment:
      - MiniMax_API_KEY=${MiniMax_API_KEY}
      - MiniMax_API_BASE=${MiniMax_API_BASE:-https://api.minimaxi.com/v1}
      - NEXUS_WS_TOKEN=${NEXUS_WS_TOKEN:-nexus-default-token}
      - NEXUS_HOME=/app
      - DATABASE_URL=/app/nexus.db
    volumes:
      - nexus-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  nexus-data:
