<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --forest-dark: #1a2f23;
      --forest-mid: #2d4a3a;
      --forest-light: #4a7c59;
      --moss: #8fbc8f;
      --cream: #faf6f0;
      --wood: #d4a574;
      --text-dark: #2c3e2d;
      --text-muted: #6b7c6b;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Noto Serif SC', serif;
      background: linear-gradient(180deg, var(--cream) 0%, #f5f0e8 100%);
      color: var(--text-dark);
      min-height: 100vh;
    }

    .bubble-user {
      background: linear-gradient(135deg, var(--forest-mid) 0%, var(--forest-light) 100%);
      color: white;
      border-radius: 24px 24px 6px 24px;
    }

    .bubble-assistant {
      background: white;
      border: 1px solid #e8e4dc;
      border-radius: 24px 24px 24px 6px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .input-area {
      background: white;
      border: 2px solid transparent;
      border-radius: 24px;
      box-shadow: 0 4px 24px rgba(45, 74, 58, 0.12);
      transition: all 0.3s ease;
    }

    .input-area:focus-within {
      border-color: var(--forest-light);
      box-shadow: 0 4px 32px rgba(45, 74, 58, 0.18);
    }

    .send-btn {
      background: linear-gradient(135deg, var(--forest-mid) 0%, var(--forest-light) 100%);
      transition: all 0.3s ease;
    }

    .send-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(45, 74, 58, 0.3);
    }

    /* 龙猫容器 */
    .totoro-container {
      position: relative;
      width: 140px;
      height: 140px;
    }

    .totoro-gif {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 8px 24px rgba(45, 74, 58, 0.25));
      border-radius: 24px;
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--moss); border-radius: 4px; }

    /* 模态框 */
    .modal-overlay {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
    }

    .modal-content {
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .config-btn {
      background: var(--cream);
      border: 1px solid #e8e4dc;
      transition: all 0.2s ease;
    }

    .config-btn:hover {
      border-color: var(--forest-light);
      background: white;
    }

    /* 模型卡片 */
    .model-card {
      background: white;
      border: 1px solid #e8e4dc;
      transition: all 0.2s ease;
    }

    .model-card:hover {
      border-color: var(--moss);
      box-shadow: 0 4px 16px rgba(45, 74, 58, 0.1);
    }

    .model-card.active {
      border-color: var(--forest-light);
      background: linear-gradient(135deg, rgba(74, 124, 89, 0.05) 0%, rgba(45, 74, 58, 0.05) 100%);
    }
  </style>
</head>
<body class="flex flex-col h-screen">
  <!-- 顶部栏 -->
  <header class="flex items-center justify-between px-6 py-4 bg-white/60 backdrop-blur-md border-b border-[#e8e4dc]">
    <div class="flex items-center gap-3">
      <img src="/app/totoro.gif" alt="龙猫" class="w-12 h-12 rounded-xl object-cover shadow-md">
      <div>
        <h1 class="text-xl font-semibold tracking-tight text-[var(--forest-mid)]">Nexus</h1>
        <p class="text-xs text-[var(--text-muted)]">智能助手</p>
      </div>
    </div>

    <div class="flex items-center gap-3">
      <!-- 模型选择 -->
      <button onclick="openModelConfig()" class="config-btn flex items-center gap-2 px-4 py-2 rounded-full">
        <span class="text-sm font-medium">MiniMax-M2.7</span>
        <svg class="w-4 h-4 text-[var(--text-muted)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>

      <!-- 状态 -->
      <div class="flex items-center gap-2 px-3 py-2 rounded-full bg-[var(--forest-mid)]/10">
        <div class="w-2 h-2 rounded-full bg-[var(--forest-light)] animate-pulse"></div>
        <span class="text-xs font-medium text-[var(--forest-mid)]">已连接</span>
      </div>
    </div>
  </header>

  <!-- 对话区域 -->
  <main id="chatArea" class="flex-1 overflow-y-auto">
    <div class="max-w-3xl mx-auto px-4 py-8 space-y-6">
      <!-- 欢迎 -->
      <div class="text-center py-12">
        <div class="totoro-container inline-block mb-6">
          <img src="/app/totoro.gif" alt="龙猫" class="totoro-gif">
        </div>
        <h2 class="text-2xl font-medium mb-2 text-[var(--text-dark)]">你好，我是 Nexus</h2>
        <p class="text-[var(--text-muted)]">我可以帮你解答问题、编写代码、分析数据...</p>
      </div>

      <!-- 快捷提示 -->
      <div class="grid grid-cols-2 gap-3">
        <button onclick="insertPrompt('帮我写一段 Python 代码')" class="p-4 rounded-2xl bg-white border border-[#e8e4dc] text-left hover:shadow-md hover:border-[var(--moss)] transition-all">
          <div class="text-sm font-medium mb-1">💻 写代码</div>
          <div class="text-xs text-[var(--text-muted)]">Python、JavaScript...</div>
        </button>
        <button onclick="insertPrompt('帮我分析这份数据')" class="p-4 rounded-2xl bg-white border border-[#e8e4dc] text-left hover:shadow-md hover:border-[var(--moss)] transition-all">
          <div class="text-sm font-medium mb-1">📊 分析数据</div>
          <div class="text-xs text-[var(--text-muted)]">Excel、CSV、JSON...</div>
        </button>
      </div>
    </div>
  </main>

  <!-- 输入区域 -->
  <footer class="px-4 pb-6 pt-2">
    <div class="max-w-3xl mx-auto">
      <div class="input-area flex items-end">
        <textarea id="inputField" class="flex-1 px-5 py-4 bg-transparent resize-none focus:outline-none text-[var(--text-dark)] placeholder-[var(--text-muted)]" rows="1" placeholder="输入消息..."></textarea>
        <button id="sendBtn" class="send-btn m-2 w-11 h-11 rounded-xl flex items-center justify-center text-white" disabled>
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
          </svg>
        </button>
      </div>
      <p class="text-center text-xs text-[var(--text-muted)] mt-3">按 Enter 发送，Shift + Enter 换行</p>
    </div>
  </footer>

  <!-- 模型配置模态框 -->
  <div id="modelModal" class="fixed inset-0 modal-overlay z-50 hidden">
    <div class="modal-content absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full max-w-lg bg-white rounded-3xl shadow-2xl overflow-hidden">
      <!-- Header -->
      <div class="flex items-center justify-between px-6 py-4 bg-[var(--forest-mid)]">
        <h2 class="text-lg font-semibold text-white">模型配置</h2>
        <button onclick="closeModelConfig()" class="w-8 h-8 rounded-full bg-[var(--forest-light)] hover:bg-[var(--moss)] text-white flex items-center justify-center transition-colors">✕</button>
      </div>

      <!-- Content -->
      <div class="p-6 max-h-[60vh] overflow-y-auto">
        <!-- 模型列表 -->
        <div id="modelList" class="space-y-3">
          <!-- 动态填充 -->
        </div>

        <!-- 添加按钮 -->
        <button onclick="showAddForm()" class="w-full mt-4 py-3 rounded-xl border-2 border-dashed border-[#e8e4dc] text-[var(--text-muted)] hover:border-[var(--forest-light)] hover:text-[var(--forest-mid)] transition-colors">
          + 添加模型
        </button>

        <!-- 添加/编辑表单 -->
        <div id="modelForm" class="hidden mt-4 p-4 bg-[var(--cream)] rounded-2xl space-y-4">
          <div>
            <label class="block text-sm font-medium mb-1">模型名称</label>
            <input type="text" id="formName" class="w-full px-3 py-2 rounded-lg border border-[#e8e4dc] focus:border-[var(--forest-light)] focus:outline-none" placeholder="例如: MiniMax-M2.7">
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">API Base</label>
            <input type="text" id="formApiBase" class="w-full px-3 py-2 rounded-lg border border-[#e8e4dc] focus:border-[var(--forest-light)] focus:outline-none" placeholder="https://api.minimaxi.com/v1">
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">API Key</label>
            <input type="password" id="formApiKey" class="w-full px-3 py-2 rounded-lg border border-[#e8e4dc] focus:border-[var(--forest-light)] focus:outline-none" placeholder="输入 API Key">
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Temperature: <span id="tempValue">0.7</span></label>
            <input type="range" id="formTemp" min="0" max="2" step="0.1" value="0.7" class="w-full accent-[var(--forest-light)]" oninput="document.getElementById('tempValue').textContent = this.value">
          </div>
          <div class="flex gap-3">
            <button onclick="saveModel()" class="flex-1 py-2 rounded-lg bg-[var(--forest-light)] text-white hover:bg-[var(--forest-mid)] transition-colors">保存</button>
            <button onclick="hideForm()" class="px-4 py-2 rounded-lg bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors">取消</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const inputField = document.getElementById('inputField');
    const sendBtn = document.getElementById('sendBtn');
    let editingModelId = null;
    let models = [];

    // 加载模型
    async function loadModels() {
      try {
        const res = await fetch('/api/models');
        models = await res.json();
        renderModels();
      } catch (e) {
        models = [{id: 'default', name: 'MiniMax-M2.7', api_base: 'https://api.minimaxi.com/v1', api_key: '***', temperature: 0.7, is_active: true}];
        renderModels();
      }
    }

    function renderModels() {
      const list = document.getElementById('modelList');
      list.innerHTML = models.map(m => `
        <div class="model-card p-4 rounded-xl ${m.is_active ? 'active' : ''}">
          <div class="flex items-start justify-between">
            <div>
              <div class="flex items-center gap-2">
                <span class="font-medium">${m.name}</span>
                ${m.is_active ? '<span class="px-2 py-0.5 bg-[var(--forest-light)] text-white text-xs rounded-full">使用中</span>' : ''}
              </div>
              <p class="text-xs text-[var(--text-muted)] mt-1">${m.api_base}</p>
              <p class="text-xs text-[var(--text-muted)]">Temperature: ${m.temperature}</p>
            </div>
            <div class="flex gap-2">
              ${!m.is_active ? `<button onclick="switchModel('${m.id}')" class="px-3 py-1 text-xs rounded-lg bg-[var(--forest-light)] text-white hover:bg-[var(--forest-mid)]">切换</button>` : ''}
              <button onclick="editModel('${m.id}')" class="px-3 py-1 text-xs rounded-lg bg-gray-100 hover:bg-gray-200">编辑</button>
              <button onclick="deleteModel('${m.id}')" class="px-3 py-1 text-xs rounded-lg text-red-500 hover:bg-red-50">删除</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function openModelConfig() {
      document.getElementById('modelModal').classList.remove('hidden');
      loadModels();
    }

    function closeModelConfig() {
      document.getElementById('modelModal').classList.add('hidden');
      hideForm();
    }

    function showAddForm() {
      editingModelId = null;
      document.getElementById('formName').value = '';
      document.getElementById('formApiBase').value = 'https://api.minimaxi.com/v1';
      document.getElementById('formApiKey').value = '';
      document.getElementById('formTemp').value = '0.7';
      document.getElementById('tempValue').textContent = '0.7';
      document.getElementById('modelForm').classList.remove('hidden');
    }

    function editModel(id) {
      const model = models.find(m => m.id === id);
      if (!model) return;
      editingModelId = id;
      document.getElementById('formName').value = model.name;
      document.getElementById('formApiBase').value = model.api_base || '';
      document.getElementById('formApiKey').value = model.api_key || '';
      document.getElementById('formTemp').value = model.temperature;
      document.getElementById('tempValue').textContent = model.temperature;
      document.getElementById('modelForm').classList.remove('hidden');
    }

    function hideForm() {
      document.getElementById('modelForm').classList.add('hidden');
      editingModelId = null;
    }

    async function saveModel() {
      const name = document.getElementById('formName').value.trim();
      const api_base = document.getElementById('formApiBase').value.trim();
      const api_key = document.getElementById('formApiKey').value;
      const temperature = parseFloat(document.getElementById('formTemp').value);

      if (!name) { alert('请输入模型名称'); return; }

      try {
        const url = editingModelId ? `/api/models/${editingModelId}` : '/api/models';
        const method = editingModelId ? 'PUT' : 'POST';
        const body = editingModelId
          ? { name, api_base, api_key, temperature }
          : { id: `model-${Date.now()}`, name, api_base, api_key, temperature };

        await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        await loadModels();
        hideForm();
      } catch (e) {
        alert('保存失败');
      }
    }

    async function switchModel(id) {
      try {
        await fetch('/api/models/switch', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id })
        });
        await loadModels();
      } catch (e) {
        alert('切换失败');
      }
    }

    async function deleteModel(id) {
      if (!confirm('确定删除?')) return;
      try {
        await fetch(`/api/models/${id}`, { method: 'DELETE' });
        await loadModels();
      } catch (e) {
        alert('删除失败');
      }
    }

    inputField.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 200) + 'px';
      sendBtn.disabled = !this.value.trim();
    });

    inputField.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (this.value.trim()) sendMessage(this.value.trim());
        this.value = '';
        this.style.height = 'auto';
        sendBtn.disabled = true;
      }
    });

    sendBtn.addEventListener('click', function() {
      if (inputField.value.trim()) {
        sendMessage(inputField.value.trim());
        inputField.value = '';
        inputField.style.height = 'auto';
        sendBtn.disabled = true;
      }
    });

    function insertPrompt(text) {
      inputField.value = text;
      inputField.dispatchEvent(new Event('input'));
      inputField.focus();
    }

    function sendMessage(content) {
      const chatArea = document.getElementById('chatArea');
      const userDiv = document.createElement('div');
      userDiv.className = 'max-w-3xl mx-auto flex justify-end';
      userDiv.innerHTML = `<div class="max-w-[80%] px-5 py-3 bubble-user">${escapeHtml(content)}</div>`;
      chatArea.appendChild(userDiv);

      const assistantDiv = document.createElement('div');
      assistantDiv.className = 'max-w-3xl mx-auto flex justify-start';
      assistantDiv.innerHTML = `<div class="max-w-[80%] px-5 py-3 bubble-assistant">思考中...</div>`;
      chatArea.appendChild(assistantDiv);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadModels();
  </script>
</body>
</html>
