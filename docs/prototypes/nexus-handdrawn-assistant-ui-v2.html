<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nexus 暖色个人助理界面 v2</title>
  <style>
    :root {
      --ink: #27231d;
      --muted: #766d60;
      --faint: #9c907d;
      --canvas: #f1dfbf;
      --paper: #fff8ec;
      --paper-soft: #f8eedc;
      --line: #dcc7a8;
      --line-strong: #b89d72;
      --forest: #314f38;
      --forest-2: #3d6245;
      --forest-soft: #edf4e8;
      --sage: #849a72;
      --tea: #d7a766;
      --wechat: #07c160;
      --shadow: 0 32px 80px rgba(64, 48, 27, 0.18);
      --soft-shadow: 0 16px 42px rgba(64, 48, 27, 0.10);
      font-family: "Avenir Next", "Gill Sans", "Trebuchet MS", ui-sans-serif, system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      color: var(--ink);
      background:
        radial-gradient(circle at 16% 16%, rgba(132, 154, 114, 0.28), transparent 26%),
        radial-gradient(circle at 78% 3%, rgba(215, 167, 102, 0.24), transparent 24%),
        linear-gradient(135deg, #ead8b6 0%, #f4e8d0 52%, #e3cfaa 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.18;
      background:
        linear-gradient(90deg, rgba(86, 67, 40, 0.10) 1px, transparent 1px),
        linear-gradient(rgba(86, 67, 40, 0.09) 1px, transparent 1px);
      background-size: 42px 42px;
      mix-blend-mode: multiply;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.24;
      background-image:
        radial-gradient(circle, rgba(77, 57, 31, 0.16) 0 1px, transparent 1px),
        radial-gradient(circle, rgba(255, 255, 255, 0.34) 0 1px, transparent 1px);
      background-size: 17px 19px, 29px 31px;
    }

    button,
    textarea {
      font: inherit;
    }

    button { cursor: pointer; }

    .app {
      position: relative;
      width: min(1400px, calc(100vw - 44px));
      height: calc(100vh - 44px);
      margin: 22px auto;
      display: grid;
      grid-template-columns: 276px minmax(0, 1fr);
      overflow: hidden;
      border: 1px solid rgba(111, 86, 48, 0.36);
      border-radius: 26px;
      background: rgba(255, 248, 236, 0.86);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .sidebar {
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
      gap: 18px;
      padding: 22px 18px;
      color: #fbf5e8;
      background:
        linear-gradient(180deg, rgba(49, 79, 56, 0.98), rgba(39, 65, 45, 0.98)),
        var(--forest);
      border-right: 1px solid rgba(91, 65, 34, 0.28);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .mark {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 248, 236, 0.58);
      background: rgba(255, 248, 236, 0.08);
      font-weight: 850;
    }

    .brand strong,
    .brand span {
      display: block;
    }

    .brand strong {
      font-size: 18px;
      line-height: 1;
    }

    .brand span {
      margin-top: 5px;
      color: rgba(251, 245, 232, 0.68);
      font-size: 12px;
    }

    .new-task {
      border: 1px solid rgba(255, 248, 236, 0.18);
      border-radius: 16px;
      background: rgba(255, 248, 236, 0.12);
      color: #fff8ec;
      min-height: 48px;
      font-weight: 760;
      box-shadow: none;
      text-align: left;
      padding: 0 14px;
    }

    .new-task:hover {
      background: rgba(255, 248, 236, 0.16);
      border-color: rgba(255, 248, 236, 0.26);
    }

    .nav {
      display: grid;
      gap: 4px;
    }

    .nav button,
    .channel {
      border: 0;
      border-radius: 13px;
      background: transparent;
      color: rgba(251, 245, 232, 0.84);
      min-height: 38px;
      padding: 0 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-align: left;
      font-weight: 650;
    }

    .nav button.active,
    .nav button:hover,
    .channel:hover {
      background: rgba(255, 248, 236, 0.12);
    }

    .tasks {
      min-height: 0;
      overflow: auto;
      padding-right: 3px;
    }

    .label {
      margin: 4px 0 9px 4px;
      color: rgba(251, 245, 232, 0.56);
      font-size: 12px;
      font-weight: 750;
    }

    .task {
      border-radius: 14px;
      padding: 11px 12px;
      margin-bottom: 7px;
      color: rgba(251, 245, 232, 0.74);
    }

    .task.active {
      background: rgba(255, 248, 236, 0.14);
      color: #fff8ec;
    }

    .task strong {
      display: block;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task span {
      display: block;
      margin-top: 4px;
      color: rgba(251, 245, 232, 0.52);
      font-size: 12px;
    }

    .sidebar-bottom {
      display: grid;
      gap: 5px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 248, 236, 0.18);
    }

    .channel span {
      color: #b9e7c6;
      font-size: 12px;
    }

    .main {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: 66px minmax(0, 1fr) auto;
      background:
        radial-gradient(circle at 95% 12%, rgba(132, 154, 114, 0.16), transparent 25%),
        linear-gradient(180deg, rgba(255, 248, 236, 0.96), rgba(255, 248, 236, 0.88));
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 0 30px;
      border-bottom: 1px solid rgba(184, 157, 114, 0.34);
    }

    .topic strong,
    .topic span {
      display: block;
    }

    .topic strong {
      font-size: 17px;
      line-height: 1.2;
    }

    .topic span {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .status {
      border: 1px solid rgba(7, 193, 96, 0.20);
      border-radius: 999px;
      background: rgba(7, 193, 96, 0.08);
      color: #356846;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 650;
    }

    .status i {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--wechat);
    }

    .work {
      min-height: 0;
      overflow: auto;
      padding: 50px 34px 36px;
    }

    .content {
      width: min(790px, 100%);
      margin: 0 auto;
    }

    .hero {
      max-width: 620px;
      margin-bottom: 26px;
    }

    .eyebrow {
      color: var(--faint);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    .hero h1 {
      margin: 0;
      color: var(--ink);
      font-size: 39px;
      line-height: 1.08;
      letter-spacing: -0.018em;
    }

    .hero p {
      max-width: 560px;
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.8;
    }

    .quick {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin: 22px 0;
    }

    .quick button {
      min-height: 68px;
      border: 1px solid rgba(184, 157, 114, 0.36);
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.56), rgba(255, 255, 255, 0.28)),
        rgba(255, 248, 236, 0.62);
      color: var(--ink);
      padding: 15px 16px;
      text-align: left;
      font-weight: 740;
      box-shadow: 0 10px 26px rgba(64, 48, 27, 0.055);
    }

    .quick button:hover {
      border-color: rgba(137, 110, 72, 0.55);
      background: rgba(255, 255, 255, 0.62);
    }

    .status-card {
      margin-top: 8px;
      border: 1px solid rgba(184, 157, 114, 0.34);
      border-radius: 20px;
      background: rgba(255, 248, 236, 0.62);
      padding: 18px;
      color: var(--muted);
      line-height: 1.7;
    }

    .status-card strong {
      color: var(--ink);
    }

    .composer-area {
      padding: 18px 30px 28px;
      background: linear-gradient(180deg, rgba(255, 248, 236, 0), rgba(255, 248, 236, 0.96) 30%);
    }

    .composer {
      width: min(850px, 100%);
      margin: 0 auto;
      border: 1px solid rgba(184, 157, 114, 0.42);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.70);
      box-shadow: var(--soft-shadow);
      overflow: hidden;
    }

    textarea {
      width: 100%;
      min-height: 84px;
      border: 0;
      outline: none;
      resize: none;
      background: transparent;
      color: var(--ink);
      padding: 18px 20px 8px;
      font-size: 15px;
      line-height: 1.65;
    }

    textarea::placeholder {
      color: #9d907c;
    }

    .composer-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: 13px;
      padding: 8px 12px 12px 18px;
    }

    .send {
      width: 36px;
      height: 36px;
      border: 0;
      border-radius: 13px;
      background: var(--forest);
      color: var(--paper);
      display: grid;
      place-items: center;
      font-weight: 850;
    }

    .sketch-line {
      position: absolute;
      pointer-events: none;
      border: 1px solid rgba(132, 154, 114, 0.28);
      border-radius: 999px;
      transform: rotate(-17deg);
    }

    .sketch-line.one {
      width: 64px;
      height: 24px;
      right: 70px;
      top: 110px;
      background: rgba(132, 154, 114, 0.18);
    }

    .sketch-line.two {
      width: 34px;
      height: 16px;
      right: 124px;
      bottom: 128px;
      background: rgba(215, 167, 102, 0.18);
      transform: rotate(22deg);
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }

      .quick {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <span class="sketch-line one"></span>
    <span class="sketch-line two"></span>

    <aside class="sidebar">
      <div class="brand">
        <div class="mark">N</div>
        <div>
          <strong>Nexus</strong>
          <span>个人 AI 助手</span>
        </div>
      </div>

      <div>
        <button class="new-task">新任务</button>
        <nav class="nav">
          <button class="active">最近任务</button>
          <button>今天</button>
          <button>已完成</button>
        </nav>
      </div>

      <div class="tasks">
        <div class="label">最近任务</div>
        <div class="task active">
          <strong>整理今天的待办</strong>
          <span>刚刚 · 应用</span>
        </div>
        <div class="task">
          <strong>总结微信消息</strong>
          <span>12 分钟前 · 微信</span>
        </div>
        <div class="task">
          <strong>记住这个项目背景</strong>
          <span>昨天 · 应用</span>
        </div>
      </div>

      <div class="sidebar-bottom">
        <button class="channel">微信通道 <span>未绑定</span></button>
        <button class="channel">设置</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topic">
          <strong>新的任务</strong>
          <span>告诉 Nexus 你想完成什么</span>
        </div>
        <div class="status"><i></i>本地助手已准备好</div>
      </header>

      <section class="work">
        <div class="content">
          <div class="hero">
            <div class="eyebrow">个人任务助手</div>
            <h1>今天想让我帮你做什么？</h1>
            <p>Nexus 会在后台理解任务、选择模型、整理上下文和记录必要信息。你只需要把事情交给它。</p>
          </div>

          <div class="quick">
            <button>整理今天的待办</button>
            <button>总结微信里的消息</button>
            <button>帮我写一封回复</button>
            <button>记住这个项目背景</button>
          </div>

          <div class="status-card">
            <strong>任务状态</strong><br />
            等你发起任务后，这里会显示「正在理解」「执行中」「需要确认」「已完成」这些用户能看懂的状态。
          </div>
        </div>
      </section>

      <div class="composer-area">
        <div class="composer">
          <textarea placeholder="告诉 Nexus 你想完成什么"></textarea>
          <div class="composer-bottom">
            <span>个人任务助手 · 本地运行</span>
            <button class="send">↑</button>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
