[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "nexus"
version = "1.0.0"
description = "Nexus - AI Gateway"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.100.0",
    "uvicorn[standard]",
    "deepagents>=0.6.0",
    "langchain-openai>=1.0.0",
    "langchain-community>=0.0.20",
    "duckduckgo-search>=4.0.0",
    "aiosqlite>=0.19.0",
    "pydantic>=2.0.0",
    "python-dotenv>=1.0.0",
    "typer[all]>=0.9.0",
    "rich>=13.0.0",
    "rank-bm25>=0.2.0",
]

[project.scripts]
nexus = "nexus.cli.main:app"

[tool.hatch.build.targets.wheel]
packages = ["nexus"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
